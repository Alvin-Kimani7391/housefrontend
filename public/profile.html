<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<style>

.progress-container {
    width: 100%;
    height: 8px;
    background: #eee;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 10px;
}

#progressBar {
    height: 100%;
    width: 0%;
    background: #4CAF50;
    transition: width 0.3s ease;
}

/* ================= PROFILE HERO ================= */
.profile-hero {
    height: 220px;
    background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                url('https://images.unsplash.com/photo-1560518883-ce09059eeffa');
    background-size: cover;
    background-position: center;
}

/* ================= PROFILE CARD ================= */
.profile-card {
    max-width: 1000px;
    margin: -80px auto 40px;
    background: white;
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
}

/* Avatar */
.profile-avatar {
    position: relative;
}

.profile-avatar img {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
    border: 5px solid white;
}

/* Verified badge */
.verified-badge {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: #00b894;
    color: white;
    font-size: 12px;
    padding: 5px 8px;
    border-radius: 50px;
    display: none; /* JS will toggle */
}

/* Info */
.profile-info {
    flex: 1;
}

.profile-info h2 {
    font-size: 26px;
}

.profile-meta {
    margin-top: 8px;
    color: #777;
    font-size: 14px;
}

/* Status pill */
.status-pill {
    display: inline-block;
    margin-top: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
}

.status-approved { background:#d1fae5; color:#059669; }
.status-pending  { background:#fff3cd; color:#b7791f; }
.status-rejected { background:#ffe0e0; color:#c0392b; }

/* ================= STATS ================= */
.profile-stats {
    display: flex;
    gap: 25px;
    margin-top: 20px;
}

.stat-box {
    background: #f8fafc;
    padding: 15px 20px;
    border-radius: 12px;
    text-align: center;
}

.stat-box h3 {
    font-size: 20px;
    color: #00b894;
}

/* ================= SECTION ================= */
.profile-section {
    max-width: 1000px;
    margin: auto;
    margin-bottom: 40px;
}

/* ================= GLASS CARD ================= */
.glass-card {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.glass-card input, .glass-card textarea {
    margin-bottom: 12px;
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* Edit bio */
#editBioBtn {
    margin-top: 10px;
    padding: 6px 12px;
    background-color: #00b894;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.hidden { display: none; }

/* ================= CONTACT INFO ================= */
.profile-contact {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 12px;
}

.contact-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #f1f5f9;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 13px;
    color: #333;
    transition: all 0.2s ease;
}

.contact-pill:hover {
    background: #e2e8f0;
    transform: translateY(-1px);
}

/* icons */
.contact-pill span {
    font-size: 14px;
}

/* Save button */
.save-btn {
    border: none;
    padding: 6px 8px;
    border-radius: 8px;
    cursor: pointer;
    background: rgba(0,0,0,0.6);
    color: white;
    font-size: 16px;
}

.save-btn.saved {
    background: #e84393;
}

/* Stats row */
.card-stats {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    font-size: 13px;
    color: #555;
}

/* Slight hover animation */
.save-btn:hover {
    transform: scale(1.1);
}

</style>
</head>
<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar">
    <div class="logo">HouseFinder</div>
    <ul class="nav-links">
        <li><a href="index2.html">Home</a></li>
        <li><a href="listings.html">Listings</a></li>
        <li><a href="profile.html" class="active">Profile</a></li>
    </ul>
    <div class="user-info">
        <span id="navName">User Name</span>
        <span class="role-badge" id="navRole">role</span>
    </div><div class="menu-toggle" id="mobile-menu">
            ☰
        </div>
    </nav>

    <div class="overlay" id="overlay"></div>

    <section class="hamburger2" id="mobilemenu">
        <ul>
        <li><a href="index2.html">Home</a></li>
        <li><a href="profile.html">Profile</a></li>
        
        <li class="addListingLink"><a href="add.html">Post a property</a></li>
        <li><a href="">About Us</a></li>
        <li><a href="">Help Center</a></li>
        <li><a href="#" class="logoutBtn">Logout</a></li>
        </ul>
    </section>

<!-- ================= HERO ================= -->
<div class="profile-hero"></div>

<!-- ================= PROFILE CARD ================= -->
<div class="profile-card">
    <!-- Avatar -->
    <div class="profile-avatar">
        <img id="profileImage" src="https://via.placeholder.com/150">
        <div class="verified-badge" id="verifiedBadge">✔</div>
    </div>

    <!-- Info -->
    <div class="profile-info">
        <h2 id="profileName">User Name</h2>
        <div class="profile-meta" id="profileMeta">Email • Joined Year</div>
        <div id="profileContact" class="profile-contact"></div>
        <div class="status-pill" id="status">Verification Pending</div>

        <p id="profileBio" style="margin-top:15px;">User bio goes here.</p>
        <textarea id="bioInput" class="hidden" rows="3"></textarea>
        <button id="editBioBtn">Edit Bio</button>

        <!-- Stats -->
        <div class="profile-stats">
            <div class="stat-box">
                <h3 id="listingsCount">0</h3>
                <p>Listings</p>
            </div>
            <div class="stat-box">
                <h3 id="savedCount">0</h3>
                <p>Saved</p>
            </div>
            <div class="stat-box">
                <h3 id="rating">0⭐</h3>
                <p>Rating</p>
            </div>
        </div>
    </div>
</div>

<div class="progress-container">
    <div id="progressBar"></div>
</div>
<p id="completion"></p>

<p id="profileTips" style="color:#777; margin-top:5px;"></p>
  

<button onclick="window.location.href='/edit-profile.html'" 
style="margin-top:10px; padding:8px 15px; border:none; background:#0984e3; color:white; border-radius:8px;">
Edit Profile
</button>

<!-- ================= VERIFICATION ================= -->
<div class="profile-section" id="verificationSection">
    <div class="glass-card">
        <h3 style="margin-bottom:15px;">Verification Documents</h3>
        <form id="verificationForm">
            <label>National ID</label>
            <input type="file" name="nationalId" required >
            <div id="agentFields" style="display:none;">
                <label>Agent Proof</label>
                <input type="file" name="agentProof" >
            </div>
            <div id="ownerFields" style="display:none;">
                <label>Utility Bill</label>
                <input type="file" name="utilityBill" >
                <label>Land Document</label>
                <input type="file" name="landDocument" >
            </div>
            <button class="contact-btn">Submit for Verification</button>
        </form>
    </div>
</div>

<!-- ================= LISTINGS ================= -->
<div class="profile-section" id="listingsSection">
    <div class="dashboard-header">
        <h2>My Listings</h2>
        <span class="listing-count" id="listingCount">0</span>
    </div>
    <div class="dashboard-grid" id="dashboardGrid">
        <!-- JS will populate listings here -->
    </div>
</div>

<script src="js/profile.js"></script>

<script>
    // ================== MOBILE MENU ==================
const menuToggle = document.getElementById("mobile-menu");
const mobileMenu = document.getElementById("mobilemenu");
const overlay = document.getElementById("overlay");

if (menuToggle && mobileMenu && overlay) {
    menuToggle.addEventListener("click", () => {
        mobileMenu.classList.toggle("active");
        overlay.classList.toggle("active");
    });

    overlay.addEventListener("click", () => {
        mobileMenu.classList.remove("active");
        overlay.classList.remove("active");
    });

    window.addEventListener("scroll", () => {
        mobileMenu.classList.remove("active");
        overlay.classList.remove("active");
    });
}
    // Show/hide verification fields based on role
    const role = localStorage.getItem('role');
    if(role === 'agent') {
        document.getElementById('agentFields').style.display = 'block';
    } else if(role === 'owner') {
        document.getElementById('ownerFields').style.display = 'block';
    }
    </script>
</body>
</html>
